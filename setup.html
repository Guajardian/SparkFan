<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AeroCore — Setup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #0a0c10;
    color: #c8ccd4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .setup-card {
    background: #12151c;
    border: 1px solid #1e2230;
    border-radius: 12px;
    padding: 40px;
    width: 360px;
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #3b82f6;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-weight: 300;
    font-size: 22px;
    margin-bottom: 8px;
    color: #e2e6ee;
  }
  .subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    background: #0a0c10;
    border: 1px solid #1e2230;
    border-radius: 8px;
    color: #e2e6ee;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #3b82f6; }
  button {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2563eb; }
</style>
</head>
<body>
<div class="setup-card">
  <div class="logo">AeroCore</div>
  <h1>First time setup</h1>
  <p class="subtitle">Create your admin account</p>
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" autocomplete="new-password" required>
    <button type="submit">Create account</button>
  </form>
</div>
</body>
</html>
